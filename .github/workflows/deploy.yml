name: CI/CD - RepoLens Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Create deploy script
        run: |
          cat > deploy.sh << 'EOF'
          #!/bin/bash
          set -e
          echo "📦 Pulling latest code..."
          cd ~/RepoLens/Backend
          git reset --hard HEAD
          git pull origin main
          echo "📥 Installing dependencies..."
          npm install --production
          echo "♻️ Reloading app..."
          pm2 reload index --update-env || pm2 start index.js --name index
          echo "✅ Deployment complete!"
          pm2 status
          EOF

      - name: Copy and run deploy script
        run: |
          scp -i ~/.ssh/deploy_key deploy.sh ubuntu@${{ secrets.EC2_HOST }}:~/deploy.sh
          ssh -o StrictHostKeyChecking=no \
              -i ~/.ssh/deploy_key \
              ubuntu@${{ secrets.EC2_HOST }} \
              "bash ~/deploy.sh"
