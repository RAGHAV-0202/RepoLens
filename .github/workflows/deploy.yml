name: CI/CD - RepoLens Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              -i ~/.ssh/deploy_key \
              ubuntu@${{ secrets.EC2_HOST }} bash -s << 'ENDSSH'
            set -e
            echo "📦 Pulling latest code..."
            cd /home/ubuntu/RepoLens/Backend
            git reset --hard HEAD
            git pull origin main
            echo "📥 Installing dependencies..."
            npm install --production
            echo "♻️ Reloading app..."
            pm2 reload index --update-env || pm2 start index.js --name index
            echo "✅ Deployment complete!"
            pm2 status
          ENDSSH

      - name: Verify
        run: |
          sleep 5
          ssh -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              -i ~/.ssh/deploy_key \
              ubuntu@${{ secrets.EC2_HOST }} bash -s << 'ENDSSH'
            pm2 describe index | grep -E "status|restart|uptime"
          ENDSSH

      - name: Notify Failure
        if: failure()
        run: echo "❌ Deployment failed! Check logs above."
