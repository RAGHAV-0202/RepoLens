name: Deploy RepoLens Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Debug secrets
        run: |
          echo "Host: ${{ secrets.EC2_HOST }}"
          echo "User: ${{ secrets.EC2_USER }}"
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "SSH KEY IS EMPTY"
          else
            echo "SSH KEY EXISTS"
          fi

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          debug : true
          script: |
            cd ~/RepoLens/Backend
            git reset --hard HEAD
            git pull origin main
            npm install
            pm2 reload index
