name: CI/CD - RepoLens Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
            echo "🚀 Starting deployment..."

            cd ~/RepoLens/Backend

            echo "📦 Pulling latest code..."
            git reset --hard HEAD
            git pull origin main

            echo "📥 Installing dependencies..."
            npm install --production

            echo "♻️ Reloading app..."
            pm2 reload index --update-env

            echo "✅ Deployment complete!"
            pm2 status
          EOF

      - name: Verify Deployment
        run: |
          sleep 5
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
            pm2 describe index | grep -E "status|restart|uptime"
          EOF

      - name: Notify Success
        if: success()
        run: echo "✅ RepoLens Backend deployed successfully!"

      - name: Notify Failure
        if: failure()
        run: echo "❌ Deployment failed! Check logs above."
