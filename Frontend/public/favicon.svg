<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="github-lens-grad" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#1f2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </radialGradient>
    <linearGradient id="lens-shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Dark GitHub background -->
  <circle cx="128" cy="128" r="128" fill="url(#github-lens-grad)"/>
  
  <!-- Octopus tentacles (subtle GitHub easter egg) -->
  <g stroke="#374151" stroke-width="3" fill="none" opacity="0.3" stroke-linecap="round">
    <path d="M 128 60 Q 100 90 85 130"/>
    <path d="M 128 60 Q 128 95 115 145"/>
  </g>
  
  <!-- Main magnifying glass lens -->
  <g>
    <!-- Lens circle with GitHub green glow -->
    <circle cx="120" cy="120" r="55" fill="none" stroke="url(#lens-shine)" stroke-width="8"/>
    
    <!-- Inner lens detail (darker) -->
    <circle cx="120" cy="120" r="50" fill="rgba(16, 185, 129, 0.05)"/>
    
    <!-- Glass shine effect -->
    <ellipse cx="100" cy="100" rx="15" ry="18" fill="rgba(255,255,255,0.15)" opacity="0.6"/>
    
    <!-- Code brackets/braces inside lens (GitHub code symbol) -->
    <g stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round">
      <path d="M 105 110 L 110 120 L 105 130"/>
      <path d="M 135 110 L 130 120 L 135 130"/>
    </g>
  </g>
  
  <!-- Magnifying glass handle (GitHub green) -->
  <g stroke="#10b981" stroke-width="7" fill="none" stroke-linecap="round">
    <line x1="160" y1="160" x2="205" y2="205"/>
  </g>
  
  <!-- Handle accent glow -->
  <line x1="160" y1="160" x2="205" y2="205" stroke="rgba(16, 185, 129, 0.2)" stroke-width="14" opacity="0.3" stroke-linecap="round"/>
</svg>